kind = "mobile"
previewPath = "/"
title = "Open Source Music App"
version = "1.0.0"
id = "artifacts/music-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24425

[services.development]
run = "pnpm --filter @workspace/music-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/music-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/music-app", "run", "serve" ]

[services.env]
PORT = "24425"
BASE_PATH = "/"
